<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> FurWaz - Website </title>
    <style>
        head {
            width: 100vw;
            height: 100vh;
        }
        body {
            background-color: #334155;
            color: #e2e8f0;
            font-family: Helvetica, sans-serif;
            font-style: normal;
            display: flex;
            width: 100vw;
            height: 100vh;
            margin: 0; padding: 0;
        }
        .center-x {
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex-grow: 1;
        }
        .center-y {
            display: flex;
            flex-direction: column;
            margin: 0 auto;
            align-items: center;
            width: fit-content;
            height: fit-content;
        }
        h1 {
            font-size: 2em;
            font-weight: 900;
            margin: 0;
        }
        p {
            font-size: 1em;
            font-weight: 600;
            margin: 0;
            color: #94a3b8;
        }
        a {
            color: #3b82f6;
            text-decoration: none;
        }
        span {
            width: 10px;
            height: 10px;
        }
    </style>
</head>
<body>
    <div class="center-x">
        <div class="center-y">
            <h1> Redirecting </h1>
            <p> Redirecting to <a href="https://furwaz.com">furwaz.com</a> </p>
            <span></span>
            <p style="color: #64748b;"> if you are stuck on this page, please click on the link above </p>
        </div>
    </div>
    <script>
        setTimeout(() => {
            window.location.replace("https://furwaz.com");
        }, 500);
    </script>
</body>
</html>
